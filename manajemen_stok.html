<!DOCTYPE html>
<html>
<head>
    <title>Manajemen Stok - Toko Tambi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #8BC34A;
            --light-green: #c2e475;
            --dark-green: #689F38;
            --bg-gray: #f0f0f0;
            --text-dark: #1a1a2e;
        }

        body {
            margin: 0;
            margin-bottom: 100px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* HEADER RAMPING & ANIMASI PERSIS INDEX.PHP */
        .header-container {
            width: 100%;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            min-height: 120px;
        }

        .header-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(to right, #c2e475ff, #8BC34A, #c2e475ff); 
            background-size: 200% 100%;
            animation: gradientMove 8s linear infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            100% { background-position: -200% 0%; }
        }

        .header-content h1 {
            color: white;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 2;
            margin: 0;
        }

        /* Gaya untuk Animasi Segitiga di Header */
        .triangle-container {
            position: absolute;
            width: 50px;
            height: 50px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: linear-gradient(45deg, #8BC34A, #C8E6C9, #c2e475ff); 
            opacity: 0.8;
            transition: opacity 0.5s ease;
            z-index: 1;
        }

        @keyframes triangleMove {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 0; }
            50% { transform: translate(50px, -50px) scale(1) rotate(180deg); opacity: 0.8; }
            100% { transform: translate(100px, 100px) scale(0.5) rotate(360deg); opacity: 0; }
        }

        /* Gaya untuk Animasi Klik Partikel */
        .click-particle {
            position: absolute;
            width: 30px;
            height: 30px;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: linear-gradient(45deg, #8BC34A, #C8E6C9, #c2e475ff); 
            z-index: 9999;
        }

        .nav-tabs {
            display: flex; background: white; padding: 5px; top: 0; z-index: 10;
            overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; justify-content: center; /* Membuat tombol ke tengah */
        }
        .nav-tabs div {
            padding: 10px 20px; font-size: 0.9em; font-weight: bold; color: #888;
            cursor: pointer; transition: 0.3s; border-radius: 20px;
        }
        .nav-tabs div.active { color: white; background: var(--primary-green); }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            position: relative; /* Wajib agar tombol X bisa menempel di pojok */
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff5252;
            color: white;
            width: 28px;  /* Sedikit lebih besar biar lega */
            height: 28px;
            border-radius: 50%;
            
            /* Kuncinya di sini */
            display: flex;
            align-items: center;      /* Tengah vertikal */
            justify-content: center;   /* Tengah horizontal */
            
            font-size: 14px;          /* Sesuaikan ukuran X nya */
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
            line-height: 0;           /* Mematikan spasi bawaan teks */
        }

        .remove-btn i {
            /* Jika pakai FontAwesome, kadang perlu reset margin */
            margin: 0;
            padding: 0;
}
        /* FORM & CARDS ALA NEURA */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; color: #777; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 12px; font-size: 1rem; }
        
        /* TABEL DATA */
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { text-align: left; padding: 10px 5px; border-bottom: 2px solid var(--primary-green); }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; }

        /* FOOTER ACTION */
        .footer-action { position: fixed; bottom: 0; width: 100%; background: white; padding: 14px; box-sizing: border-box; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 100; }
        .btn-save { width: 100%; background: var(--primary-green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; }

        /* PARTIKEL & SEGITIGA */
        .triangle-container, .click-particle { position: absolute; width: 30px; height: 30px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: rgba(255,255,255,0.2); z-index: 1; }
    </style>
</head>
<body>

<header class="header-container" id="header">
    <div class="header-content"><h1>Manajemen Stok Tambi</h1></div>
</header>

<div class="nav-tabs" id="mainTabs">
    <div class="active" onclick="openTab('stokMasuk')">Stok Masuk</div>
    <div onclick="openTab('packing')">Packing</div>
    <div onclick="openTab('dataGudang')">Data Gudang</div>
    <div onclick="openTab('dataProduk')">Data Produk</div>
</div>

<div class="container">
    <div id="stokMasuk" class="tab-content active">
        <div class="card" style="display:flex; gap:10px">
            <div style="flex:1"><label>Tanggal</label><input type="date" id="dateMasuk"></div>
            <div style="flex:1"><label>Jam</label><input type="time" id="timeMasuk"></div>
        </div>
        <div id="entryMasukContainer"></div>
        <button onclick="addEntryMasuk()" style="width:100%; padding:10px; border:2px dashed #ccc; background:none; border-radius:10px; color:#888;">+ Tambah Baris Masuk</button>
    </div>

    <div id="packing" class="tab-content">
        <div class="card"><label>Pilih Barang Mentah (Dari Gudang)</label>
            <select id="pilihMentah" onchange="updateEstimasi()">
                <option value="">-- Pilih --</option>
            </select>
            <label>Jumlah Bal yang Dibuka</label>
            <input type="number" id="qtyMentah" value="1" oninput="updateEstimasi()">
            <label>Hasil Real (Bungkus)</label>
            <input type="number" id="hasilReal" placeholder="Contoh: 48">
            <small id="infoEstimasi" style="color:var(--dark-green); font-weight:bold"></small>
        </div>
    </div>

    <div id="dataGudang" class="tab-content">
        <input type="text" id="cariGudang" placeholder="Cari di gudang..." onkeyup="filterTabel('tabelGudangBody', this.value)">
        <div class="card" style="margin-top:10px; padding:5px;">
            <table>
                <thead><tr><th>Produk</th><th>Stok</th><th>Harga</th></tr></thead>
                <tbody id="tabelGudangBody"></tbody>
            </table>
        </div>
    </div>

    <div id="dataProduk" class="tab-content">
        <input type="text" id="cariProduk" placeholder="Cari di etalase..." onkeyup="filterTabel('tabelProdukBody', this.value)">
        <div class="card" style="margin-top:10px; padding:5px;">
            <table>
                <thead><tr><th>Produk Jadi</th><th>Stok</th><th>Harga</th></tr></thead>
                <tbody id="tabelProdukBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="footer-action" id="footerSave">
    <button class="btn-save" id="btnSimpan" onclick="prosesSimpan()">SIMPAN DATA</button>
</div>

<datalist id="listGudang"></datalist>

<script>
    const SPREADSHEET_URL = "https://script.google.com/macros/s/AKfycbx_y_VdOrlxE_H3Oyp-0X8xRgODc96UkYncHByckzrUrlvXbMydXfJhnBotxp4QxErx/exec";
    let dbGudang = [], dbProduk = [];
    let currentTab = 'stokMasuk';

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-tabs div').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        currentTab = id;
        
        // Sembunyikan footer jika di tab Data
        document.getElementById('footerSave').style.display = (id === 'dataGudang' || id === 'dataProduk') ? 'none' : 'block';
    }

    async function fetchData() {
        const [resG, resP] = await Promise.all([
            fetch(SPREADSHEET_URL + "?target=gudang").then(r => r.json()),
            fetch(SPREADSHEET_URL + "?target=produk").then(r => r.json())
        ]);
        dbGudang = resG; dbProduk = resP;
        renderTabel();
        populateSelect();
    }

    function renderTabel() {
        document.getElementById('tabelGudangBody').innerHTML = dbGudang.map(g => `
            <tr><td><b>${g.nama}</b><br><small>${g.kode}</small></td><td>${g.stok} Bal</td><td>@${g.harga.toLocaleString()}</td></tr>
        `).join('');

        document.getElementById('tabelProdukBody').innerHTML = dbProduk.map(p => `
            <tr><td><b>${p.nama}</b><br><small>${p.kode}</small></td><td>${p.stok || 0} Pcs</td><td>@${p.harga.toLocaleString()}</td></tr>
        `).join('');
    }

    function populateSelect() {
        const sel = document.getElementById('pilihMentah');
        sel.innerHTML = '<option value="">-- Pilih --</option>' + dbGudang.map(g => `<option value="${g.nama}">${g.nama}</option>`).join('');
        document.getElementById('listGudang').innerHTML = dbGudang.map(g => `<option value="${g.nama}">`).join('');
    }

    function addEntryMasuk() {
    const container = document.getElementById('entryMasukContainer');
    const rowCount = container.children.length; // Cek sudah ada berapa kartu
    const id = "row-" + Date.now();
    
    const div = document.createElement('div');
    div.className = 'card';
    div.id = id;

    // Logika: Jika kartu ke-2, ke-3, dst (rowCount > 0), baru tambahkan tombol hapus
    let deleteBtn = '';
    if (rowCount > 0) {
        // Di dalam fungsi addEntryMasuk() bagian deleteBtn:
        deleteBtn = `<div class="remove-btn" onclick="document.getElementById('${id}').remove()">
                        <i class="fa fa-times"></i>
                    </div>`;
    }

    div.innerHTML = `
        ${deleteBtn}
        <label>Nama Barang</label>
        <input type="text" list="listProdukGudang" class="in-nama" placeholder="Pilih produk...">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Qty (Bal)</label><input type="number" class="in-qty"></div>
            <div style="flex:1"><label>Harga/Bal</label><input type="number" class="in-harga"></div>
        </div>`;
    
    container.appendChild(div);
}

    async function prosesSimpan() {
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerText = "Processing...";
        
        let payload = { type: currentTab };
        // Logika pengumpulan data sesuai tab aktif...
        
        alert("Fitur simpan sedang dihubungkan ke Apps Script!");
        btn.disabled = false; btn.innerText = "SIMPAN DATA";
    }

    function filterTabel(bodyId, query) {
        const q = query.toLowerCase();
        document.querySelectorAll(`#${bodyId} tr`).forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    window.onload = () => {
        const d = new Date();
        document.getElementById('dateMasuk').value = d.toISOString().split('T')[0];
        document.getElementById('timeMasuk').value = d.toTimeString().slice(0,5);
        addEntryMasuk();
        fetchData();
        for (let i = 0; i < 1; i++) createRandomTriangle();
    };

    let cart = {};
    const colorPalette = ["#C8E6C9", "#8BC34A", "#689F38", "#AED581", "#DCEDC8"];
    const header = document.querySelector('.header-container');

    // --- LOGIKA ANIMASI PARTIKEL (SALINAN PERSIS INDEX.PHP) ---

    // 1. Partikel Header (Triangle)
    const numberOfTriangles = 20;
    function createRandomTriangle() {
        const triangle = document.createElement('div');
        triangle.classList.add('triangle-container');
        const size = Math.random() * 20 + 10;
        triangle.style.width = `${size}px`;
        triangle.style.height = `${size}px`;
        
        // Posisi acak di dalam header
        const x = Math.random() * header.offsetWidth;
        const y = Math.random() * header.offsetHeight;
        
        triangle.style.left = `${x}px`;
        triangle.style.top = `${y}px`;
        triangle.style.background = colorPalette[Math.floor(Math.random() * colorPalette.length)];
        
        // Menggunakan CSS Animation triangleMove yang ada di style kamu
        triangle.style.animation = `triangleMove ${Math.random() * 10 + 5}s ease-in-out infinite`;
        
        header.appendChild(triangle);
    }

    // Inisialisasi Segitiga
    for (let i = 0; i < numberOfTriangles; i++) {
        createRandomTriangle();
    }

    // Loop Segitiga jika animasi selesai
    document.addEventListener('animationend', (event) => {
        if (event.target.classList.contains('triangle-container')) {
            event.target.remove();
            createRandomTriangle();
        }
    });

    // 2. Partikel Klik (Burst 5 Partikel)
    document.addEventListener('click', (event) => {
        // Jangan jalankan partikel klik jika yang diklik adalah tombol yang punya fungsi sendiri
        const particleCount = 5;
        for (let i = 0; i < particleCount; i++) {
            createClickParticle(event.pageX, event.pageY);
        }
    });

    function createClickParticle(x, y) {
        const particle = document.createElement('div');
        particle.classList.add('click-particle');
        const size = Math.random() * 15 + 5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.background = colorPalette[Math.floor(Math.random() * colorPalette.length)];
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        
        document.body.appendChild(particle);

        particle.animate([
            { transform: `translate(0, 0) scale(1) rotate(0deg)`, opacity: 1 },
            { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px) scale(0) rotate(360deg)`, opacity: 0 }
        ], {
            duration: 500,
            easing: 'ease-out',
            fill: 'forwards'
        });

        setTimeout(() => { particle.remove(); }, 500);
    }
</script>
</body>
</html>
