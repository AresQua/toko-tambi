<!DOCTYPE html>
<html>
<head>
    <title>Transaksi Penjualan</title>
    <link rel="icon" type="image/png" href="../icon.png">
    <link rel="apple-touch-icon" href="../icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/core.js"></script>
</head>

<body>

<div class="container-2">
    <button class="btn-back" onclick="location.href='../index.html'" style="width: auto;">Kembali</button> 
    <h1>Transaksi Penjualan</h1>
</div>

<div class="isian isian-transaksi">
<h2>Pilih Produk</h2>

    <div class="switch-container">

        <div id="tabMakanan" class="switch-btn"
            onclick="switchKategori('makanan')">
            Makanan
        </div>

        <div id="tabSemua" class="switch-btn active"
            onclick="switchKategori('semua')">
            Semua
        </div>

        <div id="tabMinuman" class="switch-btn"
            onclick="switchKategori('minuman')">
            Minuman
        </div>
    </div>

    <div class="search-box">
    <input 
        type="text" 
        id="searchInput" 
        placeholder="Cari produk, kode, atau harga..."
        oninput="filterProduk()"
    >
    </div>

<div id="produkGrid" class="grid"></div>

<!-- FOOTER CART -->
<div id="cartFooter" class="footer-cart">
    <div>Keranjang Belanja</div> <div id="cartList"></div> <div style="display:flex; justify-content:space-between; align-items:center; border-top: 2px solid #eee; padding-top: 10px;">
        <span style="font-weight:bold; color:#666;">Total Pembayaran:</span>
        <div id="totalPrice">Rp 0</div>
    </div>

    <div class="cart-action-row">
        <button class="btn-kirim" onclick="kirimTransaksi()" style="background:var(--green-main); color:white; border:none;">
            Konfirmasi & Kirim Pesanan
        </button>
    </div>
</div>
</div>

<script>

let kategoriAktif = "semua";
let produk = [];
let cart = {};

/* LOAD PRODUK */
window.onload = async function() {
    await loadProdukByKategori();
};

async function loadProdukByKategori() {

    if (kategoriAktif === "makanan") {

        produk = await apiGet("produk");

    } else if (kategoriAktif === "minuman") {

        produk = await apiGet("minuman");

    } else {

        const makanan = await apiGet("produk");
        const minuman = await apiGet("minuman");

        produk = [
            ...makanan.map(i => ({
                ...i,
                jenis: "makanan"
            })),

            ...minuman.map(i => ({
                ...i,
                jenis: "minuman"
            }))
        ];
    }

    renderProduk();
}

function switchKategori(kat) {
    kategoriAktif = kat;

    // update UI tombol
    qs("#tabMakanan").classList.toggle("active", kat === "makanan");
    qs("#tabSemua").classList.toggle("active", kat === "semua");
    qs("#tabMinuman").classList.toggle("active", kat === "minuman");

    // reset search
    qs("#searchInput").value = "";

    // reset cart (biar nggak campur kategori)
    cart = {};
    updateCart();

    // reload data
    loadProdukByKategori();
}

function renderProduk(data = produk) {

    const grid = qs("#produkGrid");

    grid.innerHTML = "";

    // MODE SEMUA
    if (kategoriAktif === "semua") {

        const makanan = data.filter(p => p.jenis === "makanan");
        const minuman = data.filter(p => p.jenis === "minuman");

        if (makanan.length > 0) {

            grid.innerHTML += `
                <div class="sub-header">
                    Makanan
                </div>
            `;

            makanan.forEach(p => {
                renderCard(p);
            });
        }

        if (minuman.length > 0) {

            grid.innerHTML += `
                <div class="sub-header">
                    Minuman
                </div>
            `;

            minuman.forEach(p => {
                renderCard(p);
            });
        }

        return;
    }

    // MODE NORMAL
    data.forEach(p => {
        renderCard(p);
    });
}

function formatNamaMinuman(p) {
    let teks = `${p.varian || ""} ${p.nama || ""}`;

    if (p.topping && p.topping !== "Default") {
        teks += ` ${p.topping}`;
    }

    if (p.ukuran && p.ukuran !== "Default") {
        teks += ` ${p.ukuran}`;
    }

    return teks.trim();
}

function renderCard(p) {

    const grid = qs("#produkGrid");
    const namaTampil = p.varian
    ? formatNamaMinuman(p)
    : p.nama;

    grid.innerHTML += `
        <div class="card"
            id="item-${p.kode}"
            onclick="pilihProduk(
                '${p.kode}',
                ${p.harga},
                '${p.varian ? formatNamaMinuman(p) : p.nama}',
                '${p.kategori || p.jenis}'
            )">
            <b>
                ${p.varian
                    ? formatNamaMinuman(p)
                    : p.nama
                }
            </b><br>

            <small>
                ${formatRupiah(p.harga)}
            </small>

        </div>
    `;
}

/* PILIH / BATAL PILIH PRODUK */
function pilihProduk(kode, harga, nama, kategori) {

    if (cart[kode]) {
        delete cart[kode];
        qs("#item-" + kode).classList.remove("selected");
    } else {
        cart[kode] = {
            nama: nama,
            harga: harga,
            jumlah: 1,
            kategori: kategori
        };
        qs("#item-" + kode).classList.add("selected");
    }

    updateCart();
}

/* UPDATE UI KERANJANG */
function updateCart() {
    const keys = Object.keys(cart);
    const footer = qs("#cartFooter");

    if (keys.length === 0) {
        footer.classList.remove("visible");
        qs("#cartList").innerHTML = "";
        qs("#totalPrice").innerHTML = "Rp 0";
        return;
    }

    footer.classList.add("visible");

    let html = "";
    let total = 0;

    keys.forEach(k => {
        const item = cart[k];
        const subtotal = item.harga * item.jumlah;
        total += subtotal;

        html += `
        <div class="cart-item">
            <div>
                <b>${item.nama}</b><br>
                <small>${formatRupiah(item.harga)} x ${item.jumlah}</small>
            </div>

            <div style="display:flex; gap:10px; align-items:center;">
                <button class="qty-btn" onclick="ubahQty('${k}', -1)">-</button>
                <b>${item.jumlah}</b>
                <button class="qty-btn" onclick="ubahQty('${k}', 1)">+</button>
            </div>
        </div>`;
    });

    qs("#cartList").innerHTML = html;
    qs("#totalPrice").innerHTML = formatRupiah(total);
}

/* KIRIM KE BACKEND */

async function kirimTransaksi() {
    const items = Object.keys(cart).map(k => ({
        kode: k,
        nama: cart[k].nama,
        harga: cart[k].harga,
        jumlah: cart[k].jumlah,
        kategori: cart[k].kategori
    }));

    apiPost({
        action: "jual_batch",
        items: items.map(i => ({
            ...i,
        }))
    });

    showToast("Transaksi berhasil!");

    cart = {};
    updateCart();
    await loadProdukByKategori();
    renderProduk();
}

function filterProduk() {
    const keyword = qs("#searchInput").value.toLowerCase();

    const filtered = produk.filter(p => {
        return (
            p.nama.toLowerCase().includes(keyword) ||
            p.kode.toLowerCase().includes(keyword) ||
            String(p.harga).includes(keyword)
        );
    });

    renderProduk(filtered);
}

function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.innerText = msg;

    document.body.appendChild(t);

    setTimeout(() => t.classList.add("show"), 10);

    setTimeout(() => {
        t.classList.remove("show");
        setTimeout(() => t.remove(), 300);
    }, 2000);
}


</script>

</body>
</html>
