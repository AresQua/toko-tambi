<!DOCTYPE html>
<html>
<head>
    <title>Transaksi Penjualan</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="core.js"></script>
</head>

<body>

<div class="container">
    <button class="btn-back" onclick="location.href='index.html'" style="width: auto;">Kembali</button> 
    <h1>Transaksi Penjualan</h1>

    <h2>Pilih Produk</h2>

    <div class="search-box">
    <input 
        type="text" 
        id="searchInput" 
        placeholder="Cari produk, kode, atau harga..."
        oninput="filterProduk()"
    >
</div>

    <div id="produkGrid" class="grid"></div>

</div>

<!-- FOOTER CART -->
<div id="cartFooter" class="footer-cart">
    <div style="font-weight:bold">Keranjang</div>
    <div id="cartList"></div>

    <div style="display:flex; justify-content:space-between; margin-top:15px;">
        <div id="totalPrice" style="font-size:1.2em;">Rp 0</div>

        <button onclick="kirimTransaksi()">Kirim</button>
    </div>
</div>

<script>

let produk = [];
let cart = {};

/* LOAD PRODUK */
window.onload = async function() {
    produk = await apiGet("produk");
    renderProduk();
};

function renderProduk(data = produk) {
    const grid = qs("#produkGrid");
    grid.innerHTML = "";

    data.forEach(p => {
        const habis = Number(p.stok) <= 0;
        grid.innerHTML += `
            <div class="card ${habis ? 'habis' : ''}" id="item-${p.kode}"
                 onclick="pilihProduk('${p.kode}', ${p.harga}, ${p.stok}, '${p.nama}')">
                 
                <b>${p.nama}</b><br>
                <small>${formatRupiah(p.harga)}</small>
                <div class="stok-label">Stok: ${p.stok}</div>
                ${habis ? "<small style='color:red'>Habis</small>" : ""}
            </div>
        `;
    });
}

/* PILIH / BATAL PILIH PRODUK */
function pilihProduk(kode, harga, stok, nama) {

    if (stok <= 0) {
        alert("Stok habis!");
        return;
    }

    if (cart[kode]) {
        delete cart[kode];
        qs("#item-" + kode).classList.remove("selected");
    } else {
        cart[kode] = {
            nama: nama,
            harga: harga,
            jumlah: 1,
            stok: stok
        };
        qs("#item-" + kode).classList.add("selected");
    }

    updateCart();
}

/* UPDATE UI KERANJANG */
function updateCart() {
    const keys = Object.keys(cart);
    const footer = qs("#cartFooter");

    if (keys.length === 0) {
        footer.classList.remove("visible");
        qs("#cartList").innerHTML = "";
        qs("#totalPrice").innerHTML = "Rp 0";
        return;
    }

    footer.classList.add("visible");

    let html = "";
    let total = 0;

    keys.forEach(k => {
        const item = cart[k];
        const subtotal = item.harga * item.jumlah;
        total += subtotal;

        html += `
        <div class="cart-item">
            <div>
                <b>${item.nama}</b><br>
                <small>${formatRupiah(item.harga)} x ${item.jumlah}</small>
            </div>

            <div style="display:flex; gap:10px; align-items:center;">
                <button class="qty-btn" onclick="ubahQty('${k}', -1)">-</button>
                <b>${item.jumlah}</b>
                <button class="qty-btn" onclick="ubahQty('${k}', 1)">+</button>
            </div>
        </div>`;
    });

    qs("#cartList").innerHTML = html;
    qs("#totalPrice").innerHTML = formatRupiah(total);
}

/* CEGAH JUMLAH > STOK */
function ubahQty(kode, delta) {
    cart[kode].jumlah += delta;

    if (cart[kode].jumlah < 1) {
        delete cart[kode];
        qs("#item-" + kode).classList.remove("selected");
    } else if (cart[kode].jumlah > cart[kode].stok) {
        cart[kode].jumlah = cart[kode].stok;
        alert("Jumlah melebihi stok!");
    }

    updateCart();
}

/* KIRIM KE BACKEND */

async function kirimTransaksi() {
    const items = Object.keys(cart).map(k => ({
        kode: k,
        nama: cart[k].nama,
        harga: cart[k].harga,
        jumlah: cart[k].jumlah
    }));

    await apiPost({
        action: "jual_batch",
        items: items
    });

    alert("Transaksi berhasil tersimpan!");

    cart = {};
    updateCart();
    produk = await apiGet("produk");
    renderProduk();
}

function filterProduk() {
    const keyword = qs("#searchInput").value.toLowerCase();

    const filtered = produk.filter(p => {
        return (
            p.nama.toLowerCase().includes(keyword) ||
            p.kode.toLowerCase().includes(keyword) ||
            String(p.harga).includes(keyword)
        );
    });

    renderProduk(filtered);
}

</script>

</body>
</html>
